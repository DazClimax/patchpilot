services:
  patchpilot:
    image: ghcr.io/dazclimax/patchpilot:v1.7.0
    container_name: patchpilot
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "8443:8443"
      - "8050:8050"
    environment:
      PORT: "8443"
      AGENT_PORT: "8050"
      AGENT_SSL: "1"
      # Optional:
      # PATCHPILOT_ADMIN_PASSWORD: "change-me"
      # PATCHPILOT_ADMIN_KEY: "set-a-long-random-hex-key"
      # PATCHPILOT_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:8000"
    volumes:
      - /opt/patchpilot:/data
