<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#020c0e"/>
  <!-- Hexagon shape -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9"
    fill="none" stroke="#27e1fa" stroke-width="1.5"
    filter="url(#glow)"/>
  <!-- Inner hexagon -->
  <polygon points="16,7 23,11 23,21 16,25 9,21 9,11"
    fill="#27e1fa22" stroke="#27e1fa" stroke-width="0.75"/>
  <!-- PP letters -->
  <text x="16" y="20" text-anchor="middle"
    font-family="monospace" font-weight="bold" font-size="10"
    fill="#27e1fa" filter="url(#glow)">PP</text>
  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
