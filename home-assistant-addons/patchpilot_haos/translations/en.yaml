configuration:
  patchpilot_server:
    name: PatchPilot Server
    description: URL of the PatchPilot agent endpoint, for example https://X.X.X.X:8050
  register_key:
    name: Register Key
    description: Temporary registration key generated from the PatchPilot Deploy page
  agent_id:
    name: Agent ID
    description: Optional custom name for this Home Assistant instance inside PatchPilot
  agent_update_webhook_id:
    name: Auto-Update Webhook ID
    description: Optional Home Assistant webhook ID (8-128 chars, letters/numbers/dash/underscore) that PatchPilot can trigger for automatic add-on updates
  poll_interval:
    name: Poll Interval
    description: Number of seconds between PatchPilot polls
  ca_pem:
    name: CA Certificate (PEM)
    description: Optional PEM certificate content for self-signed TLS servers
